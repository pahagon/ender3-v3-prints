name: Branch name

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Check branch name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|chore)/[a-z0-9][a-z0-9-]*$"

          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "OK: '$BRANCH'"
          else
            echo "ERROR: '$BRANCH' não segue a convenção."
            echo ""
            echo "Formatos válidos:"
            echo "  feat/<descricao>"
            echo "  fix/<descricao>"
            echo "  docs/<descricao>"
            echo "  chore/<descricao>"
            echo ""
            echo "Regras: lowercase, hífens, sem espaços ou underscores."
            echo "Exemplo: feat/suporte-raspberry-pi4"
            exit 1
          fi
